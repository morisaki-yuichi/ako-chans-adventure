<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&display=swap">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body class="{% if page.body_season %}s{{ page.body_season }}{% elsif page.season %}s{{ page.season }}{% endif %}">
  <header class="site-header">
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
  </header>
  <main>
    {{ content }}
  </main>
  <footer class="site-footer">
    <p>{{ site.title }} &mdash; A graded reader for English beginners</p>
  </footer>
</body>
</html>
